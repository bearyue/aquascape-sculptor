<body>
<div id="panel">
<h2>洞穴鱼缸造景雕刻生成器</h2>
<div class="desc">高度场雕刻 + 镂空薄壳 + 等值线边界裁切。框选现在支持矩形、圆形、椭圆形。</div>
<div class="section">工具</div>
<div class="tool-grid"><button class="active" data-tool="orbit">浏览旋转</button><button data-tool="raise">抬高</button><button data-tool="lower">压低</button><button data-tool="smooth">平滑</button><button data-tool="hole">开圆洞</button><button data-tool="select">框选</button></div>
<div class="section">显示设置</div>
<div class="row"><label>背景颜色 <input id="bgColor" type="color" value="#e5e7eb"></label></div>
<div class="row"><label>模型颜色 <input id="modelColor" type="color" value="#8b8b8b"></label></div>
<div class="section">结构设置</div>
<div class="row"><label>镂空薄壳模式 <input id="hollowMode" type="checkbox" checked></label></div>
<div class="row"><label>壳体/基础厚度 mm <span id="baseVal"></span></label><input id="baseThickness" type="range" min="3" max="30" value="8"></div>
<div class="section">鱼缸圆角适配</div>
<div class="row"><label>左前圆角 mm <span id="cornerFLVal"></span></label><input id="cornerFL" type="range" min="0" max="100" value="0"></div>
<div class="row"><label>右前圆角 mm <span id="cornerFRVal"></span></label><input id="cornerFR" type="range" min="0" max="100" value="0"></div>
<div class="row"><label>右后圆角 mm <span id="cornerBRVal"></span></label><input id="cornerBR" type="range" min="0" max="100" value="0"></div>
<div class="row"><label>左后圆角 mm <span id="cornerBLVal"></span></label><input id="cornerBL" type="range" min="0" max="100" value="0"></div>
<div class="section">表面纹理</div>
<div class="row"><label>纹理类型 <select id="textureType"><option value="none">无</option><option value="rough">粗糙岩面</option><option value="wood">木纹/树皮</option></select></label></div>
<div class="row"><label>纹理强度 mm <span id="textureStrengthVal"></span></label><input id="textureStrength" type="range" min="0" max="5" step="0.1" value="1.2"></div>
<div class="row"><label>纹理密度 <span id="textureScaleVal"></span></label><input id="textureScale" type="range" min="1" max="30" step="1" value="10"></div>
<div class="section">地台尺寸</div>
<div class="row"><label>宽度 mm <span id="widthVal"></span></label><input id="width" type="range" min="80" max="350" value="180"></div>
<div class="row"><label>深度 mm <span id="depthVal"></span></label><input id="depth" type="range" min="60" max="240" value="110"></div>
<div class="section">笔刷参数</div>
<div class="row"><label>笔刷半径 mm <span id="brushRadiusVal"></span></label><input id="brushRadius" type="range" min="4" max="60" value="20"></div>
<div class="row"><label>笔刷强度 mm <span id="brushStrengthVal"></span></label><input id="brushStrength" type="range" min="1" max="18" value="5"></div>
<div class="row"><label>洞半径 mm <span id="holeRadiusVal"></span></label><input id="holeRadius" type="range" min="4" max="55" value="18"></div>
<div class="section">框选操作</div>
<div class="row"><label>选区形状 <select id="selectShape"><option value="rect">矩形</option><option value="circle">圆形</option><option value="ellipse">椭圆形</option></select></label></div>
<div class="row"><label>选区拉伸步长 mm <span id="selectStepVal"></span></label><input id="selectStep" type="range" min="1" max="30" value="8"></div>
<div class="button-row three"><button id="selRaise">选区抬高</button><button id="selLower">选区压低</button><button id="selSmooth">选区平滑</button></div>
<div class="button-row"><button id="clearSelection">清空选区</button><button id="naturalize">自然起伏</button></div>
<div class="section">工程操作</div>
<div class="button-row three"><button id="undoBtn">撤销</button><button id="redoBtn">重做</button><button id="resetBtn" class="danger">重置</button></div>
<button id="exportBtn" class="primary">导出 STL</button>
<div class="hint">圆形选区使用拖拽框较短边作为直径；椭圆形使用拖拽框宽高作为长短轴。<br><span class="warn">复杂模型打印前请在切片软件中检查。</span></div>
<div id="testResult">自检中...</div>
</div>
<div id="selectBox"></div><div id="status">当前工具：浏览旋转</div>

function onPointerMove(e){if(state.tool==='orbit')return;if(state.tool==='select'){if(state.pointerDown&&state.selectionStart)updateSelectionBox(e);return;}const hit=hitTerrain(e);if(hit){const p=getParams(),r=state.tool==='hole'?p.holeRadius:p.brushRadius;brushRing.visible=true;brushRing.position.set(hit.point.x,hit.point.y+.9,hit.point.z);brushRing.scale.set(r,1,r);}else brushRing.visible=false;if(!state.pointerDown||state.tool==='hole'||!hit)return;applyBrush(hit.point,state.tool);}
function onPointerUp(e){if(state.tool==='select'&&state.pointerDown&&state.selectionStart)finishSelection(e);state.pointerDown=false;state.selectionStart=null;selectBox.style.display='none';try{renderer.domElement.releasePointerCapture(e.pointerId)}catch{}}
function applyBrush(point,mode){const p=getParams(),radius=p.brushRadius,strength=p.brushStrength,r2=radius*radius,old=state.heights;let changed=false;if(mode==='smooth'){const next=old.slice();for(let r=1;r<state.rows;r++)for(let c=1;c<state.cols;c++){const pos=vertexPosition(c,r,{...p,textureType:'none'}),dx=pos.x-point.x,dz=pos.z-point.z,dist2=dx*dx+dz*dz;if(dist2>r2)continue;const idx=vertexIndex(c,r),f=smoothFalloff(Math.sqrt(dist2)/radius),avg=(old[vertexIndex(c-1,r)]+old[vertexIndex(c+1,r)]+old[vertexIndex(c,r-1)]+old[vertexIndex(c,r+1)]+old[idx])/5;next[idx]=THREE.MathUtils.lerp(old[idx],avg,Math.min(.75,.08*strength)*f);changed=true;}if(changed)state.heights=next;}else{const sign=mode==='raise'?1:-1;for(let r=0;r<=state.rows;r++)for(let c=0;c<=state.cols;c++){const pos=vertexPosition(c,r,{...p,textureType:'none'}),dx=pos.x-point.x,dz=pos.z-point.z,dist2=dx*dx+dz*dz;if(dist2>r2)continue;const idx=vertexIndex(c,r),f=smoothFalloff(Math.sqrt(dist2)/radius);state.heights[idx]=Math.max(0,state.heights[idx]+sign*strength*f*.18);changed=true;}}if(changed){rebuild();updateSelectionVisual();}}
function smoothFalloff(t){const x=THREE.MathUtils.clamp(1-t,0,1);return x*x*(3-2*x);}function beginSelection(e){state.selectionStart={x:e.clientX,y:e.clientY};Object.assign(selectBox.style,{left:e.clientX+'px',top:e.clientY+'px',width:'0px',height:'0px',display:'block',borderRadius:ui.selectShape.value==='rect'?'0':'50%'});}function updateSelectionBox(e){const s=state.selectionStart;let l=Math.min(s.x,e.clientX),t=Math.min(s.y,e.clientY),w=Math.abs(e.clientX-s.x),h=Math.abs(e.clientY-s.y);if(ui.selectShape.value==='circle'){const d=Math.min(w,h);l=s.x<e.clientX?s.x:s.x-d;t=s.y<e.clientY?s.y:s.y-d;w=d;h=d;}Object.assign(selectBox.style,{left:l+'px',top:t+'px',width:w+'px',height:h+'px',borderRadius:ui.selectShape.value==='rect'?'0':'50%'});}function finishSelection(e){updateSelectionBox(e);selectVerticesInScreenRect(selectBox.getBoundingClientRect(),ui.selectShape.value);updateSelectionVisual();}
function isScreenPointInSelection(sx,sy,rect,shape){if(sx<rect.left||sx>rect.right||sy<rect.top||sy>rect.bottom)return false;if(shape==='rect')return true;const cx=(rect.left+rect.right)/2,cy=(rect.top+rect.bottom)/2,rx=Math.max(rect.width/2,.0001),ry=Math.max(rect.height/2,.0001),dx=(sx-cx)/rx,dy=(sy-cy)/ry;return dx*dx+dy*dy<=1;}
function selectVerticesInScreenRect(rect,shape='rect'){const p=getParams(),v=new THREE.Vector3();state.selected.fill(0);let count=0;for(let r=0;r<=state.rows;r++)for(let c=0;c<=state.cols;c++){const pos=vertexPosition(c,r,p);v.set(pos.x,pos.y,pos.z).project(camera);if(v.z<-1||v.z>1)continue;const sx=(v.x*.5+.5)*innerWidth,sy=(-v.y*.5+.5)*innerHeight;if(isScreenPointInSelection(sx,sy,rect,shape)){state.selected[vertexIndex(c,r)]=1;count++;}}const shapeName={rect:'矩形',circle:'圆形',ellipse:'椭圆形'}[shape]||shape;$('status').textContent=`当前工具：框选，${shapeName}选区已选中 ${count} 个顶点`;}
function updateSelectionVisual(){if(selectionPoints){selectionPoints.geometry.dispose();selectionPoints.material.dispose();scene.remove(selectionPoints);selectionPoints=null;}const p=getParams(),positions=[];for(let r=0;r<=state.rows;r++)for(let c=0;c<=state.cols;c++){const idx=vertexIndex(c,r);if(!state.selected[idx])continue;const pos=vertexPosition(c,r,p);positions.push(pos.x,pos.y+1,pos.z);}if(!positions.length)return;const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));selectionPoints=new THREE.Points(g,new THREE.PointsMaterial({color:0xfacc15,size:3.5,sizeAttenuation:true}));scene.add(selectionPoints);}
function selectedCount(){return state.selected.reduce((a,b)=>a+b,0);}function clearSelection(){state.selected.fill(0);updateSelectionVisual();$('status').textContent='已清空选区';}function applySelectionHeight(delta){if(!selectedCount())return $('status').textContent='没有选区：请先框选';saveHistory();for(let i=0;i<state.heights.length;i++)if(state.selected[i])state.heights[i]=Math.max(0,state.heights[i]+delta);rebuild();updateSelectionVisual();}
function smoothSelection(){if(!selectedCount())return $('status').textContent='没有选区：请先框选';saveHistory();const old=state.heights,next=old.slice();for(let r=1;r<state.rows;r++)for(let c=1;c<state.cols;c++){const idx=vertexIndex(c,r);if(!state.selected[idx])continue;next[idx]=(old[vertexIndex(c-1,r)]+old[vertexIndex(c+1,r)]+old[vertexIndex(c,r-1)]+old[vertexIndex(c,r+1)]+old[idx])/5;}state.heights=next;rebuild();updateSelectionVisual();}
function naturalizeTerrain(){saveHistory();const p=getParams();for(let r=0;r<=state.rows;r++)for(let c=0;c<=state.cols;c++){const pos=vertexPosition(c,r,{...p,textureType:'none'}),edgeFade=Math.max(0,1-Math.max(Math.abs(pos.x)/(p.width/2),Math.abs(pos.z)/(p.depth/2))*.85),n=Math.sin(pos.x*.065)*.7+Math.cos(pos.z*.075)*.5+Math.sin((pos.x+pos.z)*.035)*.5;state.heights[vertexIndex(c,r)]=Math.max(0,state.heights[vertexIndex(c,r)]+n*2.2*edgeFade);}rebuild();updateSelectionVisual();}
function snapshot(){return{heights:state.heights.slice(),holes:state.holes.map(h=>({...h})),selected:state.selected.slice()};}function restore(s){state.heights=s.heights.slice();state.holes=s.holes.map(h=>({...h}));state.selected=s.selected.slice();rebuild();updateSelectionVisual();}function saveHistory(){state.history.push(snapshot());if(state.history.length>50)state.history.shift();state.redo.length=0;}function undo(){if(!state.history.length)return $('status').textContent='没有可撤销的操作';state.redo.push(snapshot());restore(state.history.pop());$('status').textContent='已撤销';}function redo(){if(!state.redo.length)return $('status').textContent='没有可重做的操作';state.history.push(snapshot());restore(state.redo.pop());$('status').textContent='已重做';}function resetTerrain(){saveHistory();initState();state.holes=[];rebuild();updateSelectionVisual();$('status').textContent='已重置';}
function exportSTL(){terrainMesh.updateMatrixWorld(true);const stl=new STLExporter().parse(terrainMesh,{binary:false}),blob=new Blob([stl],{type:'model/stl'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aquascape-sculpted-terrain.stl';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);$('status').textContent='已导出 STL';}
function runTests(){const out=[];const test=(n,fn)=>{try{fn();out.push('✅ '+n)}catch(e){out.push('❌ '+n+': '+e.message);console.error(e)}};test('Three.js 模块加载成功',()=>{if(!THREE.BufferGeometry)throw Error('THREE 未正确加载')});test('默认地台几何体可生成',()=>{const g=createTerrainGeometry({width:180,depth:110,baseThickness:8,brushRadius:20,brushStrength:5,holeRadius:18,selectStep:8,selectShape:'rect',hollowMode:true,textureType:'none',textureStrength:0,textureScale:10,cornerFL:0,cornerFR:0,cornerBR:0,cornerBL:0});if(!g.getAttribute('position')?.count||!g.index?.count)throw Error('几何体为空');g.dispose();});test('圆形选区判断生效',()=>{const rect={left:0,right:100,top:0,bottom:100,width:100,height:100};if(!isScreenPointInSelection(50,50,rect,'circle'))throw Error('圆心未选中');if(isScreenPointInSelection(0,0,rect,'circle'))throw Error('圆外角点被误选');});test('椭圆形选区判断生效',()=>{const rect={left:0,right:160,top:0,bottom:80,width:160,height:80};if(!isScreenPointInSelection(80,40,rect,'ellipse'))throw Error('椭圆中心未选中');if(isScreenPointInSelection(0,0,rect,'ellipse'))throw Error('椭圆外角点被误选');});$('testResult').textContent=out.join('\n');}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
